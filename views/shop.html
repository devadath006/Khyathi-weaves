<section class="max-w-7xl mx-auto px-6 py-12" 
         x-data="{ modal: false, products: [], activeItem: null, images: [], activeImg: '' }" 
         x-init="fetch('/api/products').then(r=>r.json()).then(d=>{ products=d; console.log('Sarees loaded:', d); })">
    
    <div class="text-center mb-16">
        <h2 class="text-4xl font-serif font-bold text-stone-900 uppercase tracking-widest">Our Collection</h2>
        <div class="w-16 h-1 bg-rose-800 mx-auto mt-4"></div>
    </div>

    <div class="grid md:grid-cols-3 gap-10">
        <template x-for="p in products" :key="p.id">
            <div @click="activeItem=p; fetch(`/api/products/${p.id}/images`).then(r=>r.json()).then(i=>{images=i; activeImg=i[0]; modal=true})" 
                 class="bg-white border border-stone-100 rounded-3xl overflow-hidden shadow-sm cursor-pointer hover:shadow-lg transition-all group relative">
                
                <div class="aspect-[3/4] overflow-hidden bg-stone-50 relative flex items-center justify-center">
                    <img :src="p.primary_image" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    
                    <template x-if="p.is_sold === 1">
                        <div class="absolute inset-0 z-20 flex items-center justify-center pointer-events-none select-none bg-white/40 backdrop-blur-[2px]">
                            <div class="border-[6px] border-rose-700/30 text-rose-700/40 px-6 py-2 font-serif font-black text-5xl uppercase transform -rotate-45 whitespace-nowrap">
                                SOLD OUT
                            </div>
                        </div>
                    </template>
                </div>

                <div class="p-8">
                    <div class="flex justify-between items-start">
                        <h3 class="font-serif text-xl font-bold text-stone-900" x-text="p.name"></h3>
                        <template x-if="p.is_sold === 1">
                            <span class="text-[9px] font-mono bg-stone-100 text-stone-500 px-2 py-1 rounded">ARCHIVED</span>
                        </template>
                    </div>

                    <div class="mt-4">
                        <div class="flex items-center gap-2">
                            <span class="text-stone-400 line-through font-bold text-sm" x-text="p.mrp"></span>
                            <span class="bg-rose-100 text-rose-800 text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-tighter">Inaugural Offer</span>
                        </div>
                        <p class="text-rose-900 font-black text-2xl mt-1" x-text="p.price"></p>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <div class="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4" 
         x-show="modal" 
         x-cloak 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100">
        
        <div class="bg-white max-w-5xl w-full rounded-2xl overflow-hidden flex flex-col md:flex-row h-[85vh]" @click.away="modal=false">
            
            <div class="md:w-3/5 bg-stone-50 p-6 flex gap-4 overflow-hidden">
                <div class="flex flex-col gap-2 overflow-y-auto pr-2 custom-scrollbar">
                    <template x-for="img in images">
                        <img :src="img" 
                             @click="activeImg=img" 
                             class="w-20 h-24 object-cover cursor-pointer border-2 rounded-md transition-all" 
                             :class="activeImg===img ? 'border-rose-800 scale-95' : 'border-transparent hover:border-stone-200'">
                    </template>
                </div>
                <div class="flex-1 bg-white rounded-xl border flex items-center justify-center relative overflow-hidden shadow-inner p-4">
                    <img :src="activeImg" class="max-h-full max-w-full object-contain">
                    <template x-if="activeItem?.is_sold === 1">
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <span class="text-stone-900/5 font-serif font-black text-9xl uppercase transform -rotate-12">SOLD OUT</span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="md:w-2/5 p-10 flex flex-col justify-between">
                <div>
                    <h2 class="text-3xl font-serif font-bold text-stone-900" x-text="activeItem?.name"></h2>
                    
                    <div class="mt-6 p-4 bg-stone-50 rounded-xl border border-stone-100">
                        <p class="text-stone-400 line-through font-bold text-lg mb-1" x-text="activeItem?.mrp"></p>
                        <div class="flex items-center gap-3">
                            <p class="text-4xl text-rose-900 font-black font-mono" x-text="activeItem?.price"></p>
                            <span class="bg-rose-800 text-white text-[10px] px-3 py-1 rounded-full font-bold uppercase">Launch Price</span>
                        </div>
                    </div>
                    
                    <p class="mt-6 text-stone-500 text-sm leading-relaxed italic">
                        This authentic handloom masterpiece is currently offered at a special 
                        <strong class="text-stone-800">Inaugural Price</strong> to celebrate our grand opening.
                    </p>
                </div>
                
                <div class="space-y-4">
                    <template x-if="activeItem?.is_sold === 0">
                        <a :href="'https://wa.me/919446994852?text=Namaskaram! I am interested in: '+activeItem?.name" 
                           target="_blank" 
                           class="block w-full bg-emerald-600 hover:bg-emerald-700 text-white text-center py-4 rounded-xl font-bold uppercase tracking-widest text-xs transition-colors">
                           Book via WhatsApp
                        </a>
                    </template>
                    <template x-if="activeItem?.is_sold === 1">
                        <div class="block w-full bg-stone-100 text-stone-400 text-center py-4 rounded-xl font-bold uppercase tracking-widest text-xs border border-stone-200 cursor-not-allowed">
                            Currently Unavailable
                        </div>
                    </template>
                    <button @click="modal=false" class="block w-full text-stone-400 hover:text-stone-800 text-xs font-bold uppercase tracking-widest transition-colors">
                        Back to Collection
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    /* Custom scrollbar for the thumbnail gallery */
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
    
    /* Prevents Alpine components from flickering on page load */
    [x-cloak] { display: none !important; }
</style>
