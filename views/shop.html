<section class="max-w-7xl mx-auto px-6 py-12" x-data="{ modal: false, products: [], activeItem: null, images: [], activeImg: '' }" x-init="fetch('/api/products').then(r=>r.json()).then(d=>products=d)">
    
    <div class="text-center mb-16">
        <h2 class="text-4xl font-serif font-bold text-stone-900 uppercase tracking-widest">Our Collection</h2>
        <div class="w-16 h-1 bg-rose-800 mx-auto mt-4"></div>
    </div>

    <div class="grid md:grid-cols-3 gap-10">
        <template x-for="p in products" :key="p.id">
            <div @click="activeItem=p; fetch(`/api/products/${p.id}/images`).then(r=>r.json()).then(i=>{images=i; activeImg=i[0]; modal=true})" 
                 class="bg-white border border-stone-100 rounded-3xl overflow-hidden shadow-sm cursor-pointer hover:shadow-lg transition-all group relative">
                
                <div class="aspect-[3/4] overflow-hidden bg-stone-50 relative flex items-center justify-center">
                    <img :src="p.primary_image" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
                    
                    <template x-if="p.is_sold === 1">
                        <div class="absolute inset-0 z-20 flex items-center justify-center pointer-events-none select-none">
                            <div class="border-[6px] border-rose-700/30 text-rose-700/40 px-6 py-2 font-serif font-black text-5xl uppercase transform -rotate-45 whitespace-nowrap">
                                SOLD OUT
                            </div>
                        </div>
                    </template>
                </div>

                <div class="p-8">
                    <div class="flex justify-between items-center">
                        <h3 class="font-serif text-xl font-bold text-stone-900" x-text="p.name"></h3>
                        <template x-if="p.is_sold === 1">
                            <span class="text-[9px] font-mono bg-stone-100 text-stone-500 px-2 py-1 rounded">ARCHIVED</span>
                        </template>
                    </div>
                    <p class="text-rose-800 font-bold mt-2 text-lg" x-text="p.price"></p>
                </div>
            </div>
        </template>
    </div>

    <div class="fixed inset-0 bg-black/90 z-[60] flex items-center justify-center p-4" x-show="modal" x-cloak x-transition>
        <div class="bg-white max-w-5xl w-full rounded-2xl overflow-hidden flex flex-col md:flex-row h-[85vh]" @click.away="modal=false">
            
            <div class="md:w-3/5 bg-stone-50 p-6 flex gap-4 overflow-hidden">
                <div class="flex flex-col gap-2 overflow-y-auto pr-2 custom-scrollbar">
                    <template x-for="img in images">
                        <img :src="img" @click="activeImg=img" class="w-20 h-24 object-cover cursor-pointer border-2 rounded-md" :class="activeImg===img?'border-rose-800':'border-transparent hover:border-stone-200'">
                    </template>
                </div>
                <div class="flex-1 bg-white rounded-xl border flex items-center justify-center relative overflow-hidden shadow-inner">
                    <img :src="activeImg" class="max-h-full object-contain">
                    
                    <template x-if="activeItem?.is_sold === 1">
                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                            <span class="text-stone-900/10 font-serif font-black text-9xl uppercase transform -rotate-12">SOLD OUT</span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="md:w-2/5 p-10 flex flex-col justify-between">
                <div>
                    <h2 class="text-3xl font-serif font-bold text-stone-900" x-text="activeItem?.name"></h2>
                    <p class="text-3xl text-rose-800 font-bold mt-4" x-text="activeItem?.price"></p>
                    <p class="mt-8 text-stone-500 text-sm italic">This authentic handloom masterpiece has found its home.</p>
                </div>
                
                <div class="space-y-4">
                    <template x-if="activeItem?.is_sold === 0">
                        <a :href="'https://wa.me/919446994852?text=Booking: '+activeItem?.name" target="_blank" class="block w-full bg-emerald-600 text-white text-center py-4 rounded-xl font-bold uppercase tracking-widest text-xs">Book via WhatsApp</a>
                    </template>
                    
                    <template x-if="activeItem?.is_sold === 1">
                        <div class="block w-full bg-stone-100 text-stone-400 text-center py-4 rounded-xl font-bold uppercase tracking-widest text-xs border border-stone-200">Sold Out</div>
                    </template>
                    
                    <button @click="modal=false" class="block w-full text-stone-400 hover:text-stone-800 text-xs font-bold uppercase tracking-widest">Close Gallery</button>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
</style>
